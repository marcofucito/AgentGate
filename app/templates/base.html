<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AgentGate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
  </head>
  <body>
    {% if request.session.get("user_id") %}
    <nav class="topbar py-3 mb-4">
      <div class="shell d-flex align-items-center justify-content-between px-3">
        <div class="d-flex align-items-center gap-3">
          <span class="brand-mark">A</span>
          <strong>AgentGate</strong>
          <a class="nav-link" href="/">Dashboard</a>
          <a class="nav-link" href="/servers">Servers</a>
          <a class="nav-link" href="/run">Run</a>
          <a class="nav-link" href="/api-keys">API Keys</a>
          <a class="nav-link" href="/audit">Audit</a>
          <a class="nav-link" href="/integration">Codex Integration</a>
        </div>
        <form method="post" action="/logout">
          <button class="btn btn-sm btn-outline-light">Logout</button>
        </form>
      </div>
    </nav>
    {% endif %}
    <main class="shell px-3 pb-5">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
